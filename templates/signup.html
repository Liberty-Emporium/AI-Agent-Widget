{% extends "base.html" %}
{% block title %}Sign Up — Alexander AI Agent{% endblock %}
{% block content %}
<div class="container-sm" style="padding-top:3rem;">
  <div class="card">
    <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:0.25rem;">Create your account</h1>
    <p style="color:#6b7280;font-size:0.9rem;margin-bottom:1.5rem;">Free forever. No credit card required.</p>
    <form method="POST" action="/signup" autocomplete="on">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" id="email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="eye-wrap">
          <input type="password" name="password" id="password" autocomplete="new-password" placeholder="Min 8 characters" required minlength="8">
          <button type="button" class="eye-btn">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="eye-wrap">
          <input type="password" name="confirm_password" id="confirm_password" autocomplete="new-password" placeholder="Repeat your password" required minlength="8">
          <button type="button" class="eye-btn">👁️</button>
        </div>
        <p id="pw-match-msg" style="font-size:0.8rem;margin-top:4px;display:none;"></p>
      </div>
      <button type="submit" id="signup-btn" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;">Create Account →</button>
    </form>
    <p style="text-align:center;margin-top:1.25rem;font-size:0.88rem;color:#6b7280;">
      Already have an account? <a href="/login" style="color:#6366f1;">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
(function(){
  var pw = document.getElementById('password');
  var cpw = document.getElementById('confirm_password');
  var msg = document.getElementById('pw-match-msg');
  var btn = document.getElementById('signup-btn');
  function check(){
    if(!cpw.value){msg.style.display='none';btn.disabled=false;return;}
    if(pw.value===cpw.value){
      msg.textContent='✅ Passwords match';
      msg.style.color='#10b981';
      btn.disabled=false;
    } else {
      msg.textContent='❌ Passwords do not match';
      msg.style.color='#f87171';
      btn.disabled=true;
    }
    msg.style.display='block';
  }
  pw.addEventListener('input', check);
  cpw.addEventListener('input', check);
})();
</script>
{% endblock %}
