{% extends "base.html" %}
{% block title %}Forgot Password — Alexander AI Agent{% endblock %}
{% block content %}
<div class="container-sm" style="padding-top:3rem;">
  <div class="card">
    <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:0.25rem;">Reset your password</h1>
    <p style="color:#6b7280;font-size:0.9rem;margin-bottom:1.5rem;">Enter your email and we'll send a reset link.</p>
    <form method="POST" action="/forgot-password" autocomplete="on">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" id="email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;">Send Reset Link →</button>
    </form>
    <p style="text-align:center;margin-top:1.25rem;font-size:0.88rem;color:#6b7280;">
      Remembered it? <a href="/login" style="color:#6366f1;">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
